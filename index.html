<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal Kingdom Derby</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: manipulation; overflow-x: hidden; }
        
        .track-bg {
            background: linear-gradient(to bottom, 
                #f1f5f9 0%, #f1f5f9 40%, 
                #cbd5e1 40%, #cbd5e1 45%,
                #64748b 45%, #64748b 100%);
        }
        
        @keyframes gallop {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-3px) rotate(2deg); }
        }

        .racer-sprite {
            font-size: 2.5rem; /* Smaller for mobile */
            display: inline-block;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: absolute;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        @media (min-width: 768px) {
            .racer-sprite { font-size: 3.5rem; }
        }

        .active-racer { animation: gallop 0.6s infinite ease-in-out; }

        .finish-line {
            position: absolute;
            left: 10px;
            top: 45%;
            bottom: 5%;
            width: 16px;
            background: repeating-linear-gradient(
                0deg,
                #1e293b,
                #1e293b 8px,
                #ffffff 8px,
                #ffffff 16px
            );
            border: 2px solid #0f172a;
        }

        .lane-divider {
            height: 2px;
            background: rgba(255,255,255,0.3);
            width: 100%;
            position: absolute;
        }
    </style>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const QUESTIONS = [
            {
                q: "What type of skeleton does your rival, the Beetle, have?",
                options: ["Endoskeleton", "Exoskeleton", "No skeleton"],
                correct: 1,
                fact: "Invertebrates like beetles have a hard chitinous exoskeleton for protection."
            },
            {
                q: "As a Horse, you are a vertebrate. What is your internal support called?",
                options: ["Exoskeleton", "Endoskeleton", "Hydroskeleton"],
                correct: 1,
                fact: "Vertebrates have an internal framework of bone or cartilage called an endoskeleton."
            },
            {
                q: "Which of these animals lacks a vertebral column (backbone)?",
                options: ["The Shark", "The Beetle", "The Horse"],
                correct: 1,
                fact: "Sharks have backbones made of cartilage. Beetles have no backbone at all!"
            },
            {
                q: "What type of body symmetry do Horse, Shark, and Beetle all share?",
                options: ["Radial", "Asymmetry", "Bilateral"],
                correct: 2,
                fact: "Bilateral symmetry means the body can be divided into two identical halves."
            },
            {
                q: "Which group of vertebrates do Horses belong to?",
                options: ["Reptiles", "Mammals", "Amphibians"],
                correct: 1,
                fact: "Mammals are vertebrates that have hair/fur and produce milk for their young."
            },
            {
                q: "The Shark is a vertebrate. What is its skeleton made of?",
                options: ["Hardened Chitin", "Calcium Bone", "Flexible Cartilage"],
                correct: 2,
                fact: "Sharks are cartilaginous fish; their 'bones' are lighter and more flexible than yours."
            }
        ];

        const App = () => {
            const [gameState, setGameState] = useState('start');
            const [currentQ, setCurrentQ] = useState(0);
            const [playerPos, setPlayerPos] = useState(80); 
            const [beetlePos, setBeetlePos] = useState(80);
            const [sharkPos, setSharkPos] = useState(80);
            const [feedback, setFeedback] = useState(null);
            const [winner, setWinner] = useState(null);

            useEffect(() => {
                if (gameState === 'playing' && !feedback) {
                    const timer = setInterval(() => {
                        setBeetlePos(p => Math.max(8, p - (Math.random() * 0.45)));
                        setSharkPos(p => Math.max(8, p - (Math.random() * 0.35)));
                    }, 400);
                    return () => clearInterval(timer);
                }
            }, [gameState, feedback]);

            useEffect(() => {
                const finishThreshold = 10;
                if (playerPos <= finishThreshold && gameState === 'playing') {
                    setWinner('Charlotte (The Horse)');
                    setGameState('end');
                } else if (beetlePos <= finishThreshold && gameState === 'playing') {
                    setWinner('The Beetle');
                    setGameState('end');
                } else if (sharkPos <= finishThreshold && gameState === 'playing') {
                    setWinner('The Shark');
                    setGameState('end');
                }
            }, [playerPos, beetlePos, sharkPos]);

            const handleAnswer = (idx) => {
                if (feedback) return;
                const isCorrect = idx === QUESTIONS[currentQ].correct;
                
                if (isCorrect) {
                    setPlayerPos(p => Math.max(5, p - 18)); 
                    setFeedback({ type: 'win', text: "Gallop Ahead!" });
                } else {
                    setPlayerPos(p => Math.min(85, p + 8)); 
                    setFeedback({ type: 'lose', text: "Stumble!" });
                }

                setTimeout(() => {
                    setFeedback(null);
                    if (currentQ < QUESTIONS.length - 1) {
                        setCurrentQ(c => c + 1);
                    } else if (gameState !== 'end') {
                        setGameState('end');
                        setWinner(playerPos < Math.min(beetlePos, sharkPos) ? 'Charlotte (The Horse)' : 'The Rival');
                    }
                }, 2200);
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-start sm:justify-center p-2 sm:p-4">
                    <div className="w-full max-w-2xl bg-white rounded-3xl shadow-2xl overflow-hidden border-4 sm:border-[12px] border-slate-800">
                        
                        {/* Racing Track - Adjusted for mobile height */}
                        <div className="track-bg h-[240px] sm:h-[350px] w-full relative overflow-hidden">
                            <div className="finish-line"></div>
                            
                            {/* Beetle Lane */}
                            <div className="absolute top-[35%] w-full">
                                <div className="lane-divider"></div>
                                <div className="racer-sprite active-racer" style={{ left: `${beetlePos}%`, top: '-35px' }}>
                                    🪲
                                    <span className="absolute -top-4 left-1/2 -translate-x-1/2 text-[8px] font-bold text-slate-500">BEETLE</span>
                                </div>
                            </div>

                            {/* Charlotte Lane */}
                            <div className="absolute top-[60%] w-full">
                                <div className="lane-divider !bg-amber-200/50"></div>
                                <div className="racer-sprite active-racer z-10" style={{ left: `${playerPos}%`, top: '-40px' }}>
                                    🐎
                                    <span className="absolute -top-6 left-1/2 -translate-x-1/2 bg-amber-600 text-white text-[8px] px-2 py-0.5 rounded-full font-black">CHARLOTTE</span>
                                </div>
                            </div>

                            {/* Shark Lane */}
                            <div className="absolute top-[85%] w-full">
                                <div className="lane-divider"></div>
                                <div className="racer-sprite active-racer" style={{ left: `${sharkPos}%`, top: '-35px' }}>
                                    🦈
                                    <span className="absolute -top-4 left-1/2 -translate-x-1/2 text-[8px] font-bold text-slate-500">SHARK</span>
                                </div>
                            </div>
                        </div>

                        {/* Gameplay UI */}
                        <div className="p-4 sm:p-8 bg-white">
                            {gameState === 'start' && (
                                <div className="text-center py-4">
                                    <h1 className="text-3xl sm:text-5xl font-black text-slate-900 mb-2">Charlotte's Race</h1>
                                    <p className="text-slate-500 text-sm sm:text-lg mb-6 italic">Vertebrates vs Invertebrates!</p>
                                    <button 
                                        onClick={() => setGameState('playing')}
                                        className="w-full sm:w-auto bg-amber-600 text-white font-black py-4 px-10 rounded-xl text-xl shadow-[0_6px_0_rgb(180,83,9)] active:translate-y-1 active:shadow-none transition-all"
                                    >
                                        START RACE
                                    </button>
                                </div>
                            )}

                            {gameState === 'playing' && (
                                <div className="relative">
                                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                                        <div className="text-slate-900 font-black text-lg">Q {currentQ + 1}/6</div>
                                        <div className="text-[10px] font-black text-amber-600 uppercase">Vertebrate Derby</div>
                                    </div>

                                    <h2 className="text-xl sm:text-2xl font-bold text-slate-800 mb-6 min-h-[60px]">
                                        {QUESTIONS[currentQ].q}
                                    </h2>

                                    <div className="grid grid-cols-1 gap-3">
                                        {QUESTIONS[currentQ].options.map((opt, i) => (
                                            <button
                                                key={i}
                                                onClick={() => handleAnswer(i)}
                                                disabled={!!feedback}
                                                className={`p-4 rounded-xl border-2 text-left font-bold text-lg transition-all
                                                    ${feedback ? 'opacity-40' : 'active:bg-amber-100 border-slate-200 bg-slate-50 text-slate-700'}
                                                `}
                                            >
                                                {opt}
                                            </button>
                                        ))}
                                    </div>

                                    {feedback && (
                                        <div className="absolute inset-0 z-40 flex items-center justify-center p-4">
                                            <div className="bg-white p-6 rounded-3xl shadow-2xl border-4 border-slate-900 text-center animate-in zoom-in duration-200">
                                                <div className={`text-4xl font-black mb-2 ${feedback.type === 'win' ? 'text-green-500' : 'text-red-500'}`}>
                                                    {feedback.type === 'win' ? 'GREAT!' : 'OOPS!'}
                                                </div>
                                                <p className="text-sm font-bold text-slate-600 leading-tight">{QUESTIONS[currentQ].fact}</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {gameState === 'end' && (
                                <div className="text-center py-4">
                                    <div className="text-6xl mb-4"> {winner.includes('Charlotte') ? '🥇' : '🏁'} </div>
                                    <h2 className="text-3xl font-black text-slate-900 mb-2">{winner} WINS!</h2>
                                    <p className="text-sm text-slate-500 mb-8 px-4">
                                        {winner.includes('Charlotte') 
                                            ? "Charlotte the Horse proved that mammals have the strongest endoskeletons!" 
                                            : "A tough race! Remember, your internal bones give you the advantage in size and strength."}
                                    </p>
                                    <button 
                                        onClick={() => window.location.reload()}
                                        className="w-full bg-slate-900 text-white font-black py-4 px-10 rounded-xl text-lg"
                                    >
                                        RETRY
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
